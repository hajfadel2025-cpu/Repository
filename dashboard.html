<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكتب حاج فاضل - الإدارة المالية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .header { background: #7B1FA2; color: white; padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .container { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
        .form-box, .data-box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2, h3 { color: #333; margin-top: 0; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-family: 'Cairo'; box-sizing: border-box; }
        button { background: #7B1FA2; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #5E1683; }
        .stats { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-card { flex: 1; background: #fff; padding: 15px; border-radius: 10px; border-right: 5px solid #7B1FA2; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: right; }
        th { background: #f8f9fa; }
        .type-in { color: green; font-weight: bold; }
        .type-out { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h1>لوحة تحكم مكتب حاج فاضل</h1>
    <button style="width: auto; background: #D32F2F;" onclick="logout()">خروج</button>
</div>

<div class="stats">
    <div class="stat-card">
        <div>رصيد الدولار ($)</div>
        <h2 id="total-usd">0</h2>
    </div>
    <div class="stat-card" style="border-right-color: #FFD600;">
        <div>رصيد الدينار (IQD)</div>
        <h2 id="total-iqd">0</h2>
    </div>
</div>

<div class="container">
    <div class="form-box">
        <h3>إضافة حركة جديدة</h3>
        <label>نوع العملية:</label>
        <select id="type">
            <option value="in">إيداع / وارد (+)</option>
            <option value="out">سحب / صادر (-)</option>
        </select>
        
        <label>العملة:</label>
        <select id="currency">
            <option value="USD">دولار ($)</option>
            <option value="IQD">دينار عراقي</option>
        </select>
        
        <label>المبلغ:</label>
        <input type="number" id="amount" placeholder="أدخل المبلغ هنا...">
        
        <label>البيان:</label>
        <input type="text" id="note" placeholder="مثال: حوالة من السيد...">
        
        <button id="add-btn">حفظ العملية في الصندوق</button>
    </div>

    <div class="data-box">
        <h3>سجل الحركات المالية الأخير</h3>
        <table id="transactions-table">
            <thead>
                <tr>
                    <th>التاريخ</th>
                    <th>البيان</th>
                    <th>المبلغ</th>
                    <th>الحالة</th>
                </tr>
            </thead>
            <tbody id="list">
                <!-- البيانات تظهر هنا تلقائياً -->
            </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBYYTuw5bY2RZM27mZynVuvmmWxQNvomKQ",
        authDomain: "haj-fadel-accounting.firebaseapp.com",
        projectId: "haj-fadel-accounting",
        storageBucket: "haj-fadel-accounting.firebasestorage.app",
        messagingSenderId: "449205985318",
        appId: "1:449205985318:web:2dece1e1412165b01f46e7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // حماية الصفحة: العودة لتسجيل الدخول إذا لم يكن هناك مستخدم
    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = "index.html";
    });

    // إضافة بيانات إلى Firestore
    document.getElementById('add-btn').onclick = async () => {
        const amount = parseFloat(document.getElementById('amount').value);
        const note = document.getElementById('note').value;
        
        if(!amount || amount <= 0) return alert("يرجى إدخال مبلغ صحيح");
        if(!note) return alert("يرجى كتابة البيان");

        try {
            await addDoc(collection(db, "transactions"), {
                type: document.getElementById('type').value,
                currency: document.getElementById('currency').value,
                amount: amount,
                note: note,
                date: new Date()
            });
            document.getElementById('amount').value = '';
            document.getElementById('note').value = '';
            alert("تم حفظ العملية بنجاح");
        } catch (e) {
            alert("خطأ في الحفظ: " + e.message);
        }
    };

    // جلب البيانات وحساب الأرصدة مباشرة
    const q = query(collection(db, "transactions"), orderBy("date", "desc"));
    onSnapshot(q, (snapshot) => {
        let listHtml = '';
        let usdBalance = 0;
        let iqdBalance = 0;

        snapshot.forEach(doc => {
            const data = doc.data();
            const colorClass = data.type === 'in' ? 'type-in' : 'type-out';
            const typeLabel = data.type === 'in' ? 'وارد' : 'صادر';
            
            listHtml += `
                <tr>
                    <td>${data.date.toDate().toLocaleDateString('ar-EG')}</td>
                    <td>${data.note}</td>
                    <td>${data.amount.toLocaleString()} ${data.currency}</td>
                    <td class="${colorClass}">${typeLabel}</td>
                </tr>
            `;

            // حساب الرصيد
            if(data.currency === 'USD') {
                usdBalance += (data.type === 'in' ? data.amount : -data.amount);
            } else {
                iqdBalance += (data.type === 'in' ? data.amount : -data.amount);
            }
        });

        document.getElementById('list').innerHTML = listHtml;
        document.getElementById('total-usd').innerText = usdBalance.toLocaleString();
        document.getElementById('total-iqd').innerText = iqdBalance.toLocaleString();
    });

    window.logout = () => signOut(auth).then(() => window.location.href = "index.html");
</script>

</body>
</html>
